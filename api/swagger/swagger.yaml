consumes:
- application/json
definitions:
  AddSightingsPayload:
    example:
      area: Shinjuku
      city: Tokyo
      classification: 目撃
      date: "2024-10-12"
      details: Bear was approximately 200kg, seen moving slowly.
      latitude: 35.6895
      longitude: 139.6917
      situation: Bear was seen near the trail, moving towards the forest.
      time: "09:30"
    properties:
      area:
        description: Specific area or district where the sighting occurred
        example: Shinjuku
        type: string
      city:
        description: City or municipality of the sighting
        example: Tokyo
        type: string
      classification:
        description: Classification of sighting
        enum:
        - 目撃
        - 痕跡
        - 噂
        example: 目撃
        type: string
      date:
        description: Date of the sighting (ISO 8601 format)
        example: "2024-10-12"
        type: string
      details:
        description: Additional details or description
        example: Bear was approximately 200kg, seen moving slowly.
        type: string
      latitude:
        description: Latitude of the sighting location
        example: 35.6895
        format: double
        type: number
      longitude:
        description: Longitude of the sighting location
        example: 139.6917
        format: double
        type: number
      situation:
        description: Details about the sighting situation
        example: Bear was seen near the trail, moving towards the forest.
        type: string
      time:
        description: Time of the sighting (24-hour format HH:MM)
        example: "09:30"
        type: string
    required:
    - latitude
    - longitude
    - city
    - area
    - date
    - time
    - situation
    - details
    - classification
    title: AddSightingsPayload
    type: object
  Sighting:
    description: Bear Sighting (default view)
    example:
      area: Praesentium inventore officiis praesentium voluptas totam ut.
      city: Quo qui totam.
      classification: Molestiae consequatur harum et autem.
      date: Quod iusto ducimus.
      details: Omnis consequatur repellendus aut velit voluptatem iusto.
      id: 7799709455528099038
      latitude: 0.11211262589542992
      longitude: 0.8980052967233746
      situation: Quis nam harum quis ut nobis natus.
      time: Iure totam dolor repudiandae blanditiis sunt.
    properties:
      area:
        description: Specific area or district where the sighting occurred
        example: Praesentium inventore officiis praesentium voluptas totam ut.
        type: string
      city:
        description: City or municipality of the sighting
        example: Quo qui totam.
        type: string
      classification:
        description: Classification of sighting
        example: Molestiae consequatur harum et autem.
        type: string
      date:
        description: Date of the sighting
        example: Quod iusto ducimus.
        type: string
      details:
        description: Additional details or description
        example: Omnis consequatur repellendus aut velit voluptatem iusto.
        type: string
      id:
        description: Unique sighting ID
        example: 7799709455528099038
        format: int64
        type: integer
      latitude:
        description: Latitude of the sighting location
        example: 0.11211262589542992
        format: double
        type: number
      longitude:
        description: Longitude of the sighting location
        example: 0.8980052967233746
        format: double
        type: number
      situation:
        description: Details about the sighting situation
        example: Quis nam harum quis ut nobis natus.
        type: string
      time:
        description: Time of the sighting
        example: Iure totam dolor repudiandae blanditiis sunt.
        type: string
    required:
    - id
    - latitude
    - longitude
    - city
    - area
    - date
    - time
    - situation
    - classification
    title: 'Mediatype identifier: application/vnd.sighting+json; view=default'
    type: object
host: localhost:8080
info:
  description: API for recording and retrieving bear sightings
  title: Bear Sighting API
  version: ""
paths:
  /sightings/:
    post:
      description: Add a new bear sighting
      operationId: sightings#add
      parameters:
      - in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/AddSightingsPayload'
      produces:
      - application/vnd.sighting+json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Sighting'
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      schemes:
      - http
      summary: add sightings
      tags:
      - sightings
produces:
- application/json
responses:
  BadRequest:
    description: Bad Request
  InternalServerError:
    description: Internal Server Error
schemes:
- http
swagger: "2.0"
